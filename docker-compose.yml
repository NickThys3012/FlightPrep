services:
  web:
    build:
      context: ./src/FlightPrep
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=flightprep;Username=fpuser;Password=fppass
    volumes:
      - dpkeys:/root/.aspnet/DataProtection-Keys
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flightprep
      POSTGRES_USER: fpuser
      POSTGRES_PASSWORD: fppass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fpuser -d flightprep"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
volumes:
  pgdata:
  dpkeys:
