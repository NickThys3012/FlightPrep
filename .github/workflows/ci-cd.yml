name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # git push release-notes.json
      models: read           # GitHub Models API (gpt-4o-mini)
      pull-requests: write   # post coverage comment on PR
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FlightPrep.slnx

      - name: Build
        run: dotnet build src/FlightPrep/FlightPrep.csproj --no-restore -c Release

      - name: Build unit tests
        run: |
          dotnet build src/FlightPrep.Tests/FlightPrep.Tests.csproj -c Release
          dotnet build src/FlightPrep.Domain.Tests/FlightPrep.Domain.Tests.csproj -c Release
          dotnet build src/FlightPrep.Infrastructure.Tests/FlightPrep.Infrastructure.Tests.csproj -c Release

      - name: Run unit tests — Web (with coverage)
        run: |
          dotnet test src/FlightPrep.Tests/FlightPrep.Tests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=unit-results.trx" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=${{ github.workspace }}/coverage/web/ \
            /p:Threshold=85 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total \
            '/p:ExcludeByFile="**/Migrations/**,**/Program.cs,**/*.razor,**/PdfService.cs,**/AppDbContext.cs"'

      - name: Run unit tests — Domain (with coverage)
        run: |
          dotnet test src/FlightPrep.Domain.Tests/FlightPrep.Domain.Tests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=domain-results.trx" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=${{ github.workspace }}/coverage/domain/

      - name: Run unit tests — Infrastructure (with coverage)
        run: |
          dotnet test src/FlightPrep.Infrastructure.Tests/FlightPrep.Infrastructure.Tests.csproj \
            --no-build -c Release \
            --logger "trx;LogFileName=infra-results.trx" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=${{ github.workspace }}/coverage/infra/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coverage/

      - name: Generate coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        if: github.event_name == 'pull_request'
        with:
          filename: "coverage/web/coverage.cobertura.xml"
          badge: true
          fail_below_min: false
          format: markdown
          indicators: true
          output: both
          thresholds: '85 94'

      - name: Post coverage comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release notes (only on push to main)
        id: rn
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0] // empty' 2>/dev/null || echo "")

          if [ -z "$PR_JSON" ]; then
            echo "No PR found for this commit — skipping release notes"
            echo "generated=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          echo "Generating release note for PR #$PR_NUMBER..."

          export PR_TITLE=$(echo "$PR_JSON"  | jq -r '.title')
          export PR_BODY=$(echo "$PR_JSON"   | jq -r '.body // ""')
          export PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login')
          export PR_LABELS=$(echo "$PR_JSON" | jq -c '[.labels[].name]')
          export MERGE_DATE=$(echo "$PR_JSON" | jq -r '.merged_at')
          export CHANGED_FILES=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '[.[].filename] | join(", ")' | head -c 800)

          node --input-type=module < .github/scripts/generate-ai-description.mjs

          export PR_NUMBER
          node --input-type=module < .github/scripts/update-release-notes.mjs

          echo "generated=true"          >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER"    >> $GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish src/FlightPrep/FlightPrep.csproj -c Release -o ./publish /p:UseAppHost=false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flightprep-publish
          path: ./publish

      - name: Commit release notes to main
        if: steps.rn.outputs.generated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/FlightPrep/wwwroot/release-notes.json
          git diff --cached --quiet && exit 0
          git commit -m "docs: release notes voor PR #${{ steps.rn.outputs.pr_number }}"
          git push

  e2e:
    runs-on: ubuntu-latest
    needs: build
    if: "!contains(github.event.head_commit.message, '[skip e2e]')"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Start app stack (docker compose)
        run: docker compose up -d --build
        working-directory: .
        env:
          SEED_ADMIN_USERNAME: admin@e2etest.local
          SEED_ADMIN_PASSWORD: E2eTest_Admin_123!

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app on port 8082..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8082 > /dev/null; then
              echo "App is up after ${i}s"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8082 || (echo "App did not start" && docker compose logs && exit 1)

      - name: Restore test project
        run: dotnet restore src/FlightPrep.Tests.UI/FlightPrep.Tests.UI.csproj

      - name: Build test project
        run: dotnet build src/FlightPrep.Tests.UI/FlightPrep.Tests.UI.csproj --no-restore

      - name: Install Playwright browsers
        run: pwsh src/FlightPrep.Tests.UI/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests
        run: >
          dotnet test src/FlightPrep.Tests.UI/FlightPrep.Tests.UI.csproj
          --no-build
          --settings src/FlightPrep.Tests.UI/NUnit.runsettings
          --logger "trx;LogFileName=e2e-results.trx"
          --results-directory ./test-results
        env:
          E2E_ADMIN_EMAIL: admin@e2etest.local
          E2E_ADMIN_PASSWORD: E2eTest_Admin_123!

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: ./test-results/

      - name: Upload Playwright traces (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: src/FlightPrep.Tests.UI/bin/Debug/net10.0/playwright-traces/

      - name: Dump app logs on failure
        if: failure()
        run: docker compose logs

  deploy:
    needs: [ build, e2e ]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    environment: production
    # Required GitHub Actions secrets for this job:
    # - AZURE_PUBLISH_PROFILE : App Service publish profile (XML)
    # Note: APPLICATIONINSIGHTS_CONNECTION_STRING is managed by Bicep (infra/main.bicep)
    #       and does not need to be injected here.
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: flightprep-publish
          path: ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: flightprep-web
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./publish

